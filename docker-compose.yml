services:
  postgres:
    image: postgres:16-alpine
    container_name: epreuve_web_postgres
    environment:
      POSTGRES_DB: epreuve_web
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d epreuve_web"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Interface web legere pour inspecter PostgreSQL sans passer par Prisma Studio.
  adminer:
    image: adminer:4
    container_name: epreuve_web_adminer
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  postgres_data:
